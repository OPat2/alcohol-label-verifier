version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: label-verifier-postgres
    environment:
      POSTGRES_USER: labeladmin
      POSTGRES_PASSWORD: labelverifier_secure_pwd
      POSTGRES_DB: label_verifier_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labeladmin -d label_verifier_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - label-verifier-network

  # Redis for batch job queue
  redis:
    image: redis:7-alpine
    container_name: label-verifier-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - label-verifier-network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: label-verifier-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://labeladmin:labelverifier_secure_pwd@postgres:5432/label_verifier_db
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:3000
      API_PORT: 5000
      LOG_LEVEL: debug
      MOCK_VISION_API: "true"
    ports:
      - "5000:5000"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/packages/backend/node_modules
    networks:
      - label-verifier-network
    command: npm run dev -w packages/backend
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: label-verifier-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend:/app/packages/frontend
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/packages/frontend/node_modules
    networks:
      - label-verifier-network
    command: npm run dev -w packages/frontend
    restart: unless-stopped

  # PGAdmin for database visualization (optional, dev only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: label-verifier-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - label-verifier-network
    restart: unless-stopped

networks:
  label-verifier-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
